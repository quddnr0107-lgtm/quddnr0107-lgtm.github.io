<!DOCTYPE html>
<html lang="ko-KR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-site-verification" content="IRLogYt9IG4J6_awbn_zINZb4tgRRClL3MUgY4iKC9g" />
  {% seo %}
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | absolute_url }}">
  <link rel="sitemap" type="application/xml" href="{{ '/sitemap.xml' | absolute_url }}">
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", "맑은 고딕", sans-serif; line-height: 1.75; color: #1a1a1a; max-width: 760px; margin: 0 auto; padding: 24px 20px; background: #fafafa; }
    header { border-bottom: 2px solid #E63946; padding-bottom: 16px; margin-bottom: 32px; }
    header h1 { margin: 0; font-size: 1.5em; }
    header h1 a { color: #1a1a1a; text-decoration: none; }
    header p { margin: 4px 0 0; color: #666; font-size: 0.9em; }
    nav { margin-top: 12px; }
    nav a { color: #666; text-decoration: none; margin-right: 16px; font-size: 0.9em; }
    nav a:hover { color: #E63946; }
    main { background: #fff; padding: 32px 28px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
    h1, h2, h3, h4 { line-height: 1.4; }
    h1 { font-size: 1.7em; border-bottom: 1px solid #eee; padding-bottom: 12px; }
    h2 { font-size: 1.3em; margin-top: 2em; color: #333; }
    h3 { font-size: 1.1em; margin-top: 1.5em; color: #555; }
    a { color: #E63946; }
    blockquote { border-left: 3px solid #E63946; margin: 1.2em 0; padding: 0.4em 16px; background: #fff8f8; color: #444; }
    ul { padding-left: 1.2em; }
    li { margin: 0.4em 0; }
    code { background: #f0f0f0; padding: 2px 6px; border-radius: 3px; font-size: 0.92em; }
    .post-meta { color: #888; font-size: 0.88em; margin: -8px 0 24px; }
    .post-tags { margin-top: 24px; padding-top: 16px; border-top: 1px solid #eee; }
    .post-tags a { display: inline-block; background: #f0f0f0; padding: 3px 10px; border-radius: 12px; margin: 2px 4px 2px 0; font-size: 0.85em; text-decoration: none; color: #555; }
    .cta { background: #1a1a1a; color: #fff; padding: 20px; border-radius: 8px; margin: 32px 0; }
    .cta h3 { color: #fff; margin: 0 0 8px; }
    .cta a { color: #E63946; font-weight: bold; }
    .post-list { list-style: none; padding: 0; }
    .post-list li { padding: 14px 0; border-bottom: 1px solid #eee; }
    .post-list li a { text-decoration: none; color: #1a1a1a; font-weight: 600; }
    .post-list li a:hover { color: #E63946; }
    .post-list .date { color: #999; font-size: 0.85em; margin-right: 8px; }
    .book-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin: 24px 0; }
    .book-card { background: #1a1a1a; color: #fff; padding: 20px; border-radius: 8px; text-decoration: none; transition: transform 0.15s; }
    .book-card:hover { transform: translateY(-3px); }
    .book-card .code { color: #E63946; font-size: 1.4em; font-weight: bold; }
    .book-card .title { font-size: 1.05em; margin: 8px 0 4px; }
    .book-card .sub { color: #ccc; font-size: 0.85em; }
    footer { text-align: center; color: #888; font-size: 0.85em; margin-top: 40px; padding: 20px 0; }
    @media (max-width: 600px) {
      main { padding: 20px 16px; }
      h1 { font-size: 1.4em; }
    }
  </style>
</head>
<body>
  <header>
    <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
    <p>{{ site.description }}</p>
    <nav>
      <a href="{{ '/' | relative_url }}">홈</a>
      <a href="{{ '/category/자기계발/' | relative_url }}">자기계발</a>
      <a href="{{ '/category/다이어트/' | relative_url }}">다이어트</a>
      <a href="{{ '/category/공부법/' | relative_url }}">공부법</a>
      <a href="{{ '/about/' | relative_url }}">저자</a>
    </nav>
  </header>
  <main>
    {{ content }}
  </main>
  <footer>
    © 2026 {{ site.author }} · 연락 {{ site.email }} · <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
  </footer>
</body>
</html>
